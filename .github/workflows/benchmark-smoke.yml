name: Benchmark Smoke

on:
  pull_request:
  push:
    branches: [ "main" ]

concurrency:
  group: benchmark-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install OpenBLAS
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          use-cache: true
          cache-key: zig-benchmark-smoke-${{ runner.os }}-0.15.2
          cache-size-limit: 2048

      - name: Run OpenBLAS provider parity suite
        run: zig build -Dhost_blas=openblas test-provider-parity

      - name: Run OpenBLAS example smoke suite
        run: zig build -Dhost_blas=openblas test-example-smoke

      - name: Resolve baseline revision
        id: baseline
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            baseline_sha="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            baseline_sha="${{ github.event.before }}"
          else
            baseline_sha=""
          fi
          echo "sha=$baseline_sha" >> "$GITHUB_OUTPUT"

      - name: Run candidate benchmark smoke suite
        run: zig build -Dhost_blas=openblas benchmark

      - name: Run OpenBLAS thread-sweep smoke benchmark
        run: |
          zig build -Dhost_blas=openblas benchmark -- \
            --spec benchmarks/specs/primitive/matmul-f32-256x256x256.json \
            --thread-count 1 \
            --thread-count 2 \
            --thread-count 4 \
            --output benchmarks/results/thread-sweep.jsonl

      - name: Prepare baseline worktree
        if: steps.baseline.outputs.sha != ''
        shell: bash
        run: |
          set -euo pipefail
          git worktree add ../zigrad-baseline "${{ steps.baseline.outputs.sha }}"

      - name: Run baseline benchmark smoke suite
        if: steps.baseline.outputs.sha != ''
        working-directory: ../zigrad-baseline
        run: zig build -Dhost_blas=openblas benchmark

      - name: Copy baseline benchmark results
        if: steps.baseline.outputs.sha != ''
        shell: bash
        run: |
          set -euo pipefail
          cp ../zigrad-baseline/benchmarks/results/latest.jsonl benchmarks/results/baseline.jsonl

      - name: Compare benchmark smoke results
        if: steps.baseline.outputs.sha != ''
        run: |
          zig build benchmark-compare -- \
            --baseline benchmarks/results/baseline.jsonl \
            --candidate benchmarks/results/latest.jsonl \
            --runner zig \
            --json-output benchmarks/results/comparison.json \
            --report-output benchmarks/results/comparison.txt

      - name: Baseline unavailable
        if: steps.baseline.outputs.sha == ''
        run: echo "No baseline revision available; skipping benchmark comparison."

      - name: Generate thread-scaling publication artifacts
        run: |
          zig build -Dhost_blas=openblas benchmark-thread-report -- \
            --input benchmarks/results/thread-sweep.jsonl \
            --baseline-thread-count 1 \
            --markdown-output benchmarks/results/thread-scaling.md \
            --json-output benchmarks/results/thread-scaling.json

      - name: Build benchmark publication bundle
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --candidate-jsonl benchmarks/results/latest.jsonl
            --extra-results-jsonl benchmarks/results/thread-sweep.jsonl
            --thread-report-json benchmarks/results/thread-scaling.json
            --thread-report-markdown benchmarks/results/thread-scaling.md
            --manifest-output benchmarks/results/publication-manifest.json
            --summary-output benchmarks/results/publication-summary.md
          )
          if [ -f benchmarks/results/baseline.jsonl ] && [ -f benchmarks/results/comparison.json ] && [ -f benchmarks/results/comparison.txt ]; then
            args+=(--baseline-jsonl benchmarks/results/baseline.jsonl)
            args+=(--comparison-json benchmarks/results/comparison.json)
            args+=(--comparison-text benchmarks/results/comparison.txt)
          fi
          zig build -Dhost_blas=openblas benchmark-publication-bundle -- "${args[@]}"
          cat benchmarks/results/publication-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results

      - name: Remove baseline worktree
        if: always() && steps.baseline.outputs.sha != ''
        shell: bash
        run: git worktree remove --force ../zigrad-baseline
